<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="keywords" content="salud visual corporativa Querétaro, examen de la vista Querétaro, lentes de oficina, lentes para computadora, salud visual móvil, lentes de seguridad graduados, NOM-017-STPS Querétaro">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f7ff',
              100: '#e0effe',
              200: '#bae0fd',
              300: '#7cc8fc',
              400: '#36aef9',
              500: '#0c94eb',
              600: '#0275c7',
              700: '#035da1',
              800: '#075085',
              900: '#0c436e',
              950: '#082b49',
            },
            accent: {
              50: '#fdf2f8',
              100: '#fce7f3',
              200: '#fbcfe8',
              300: '#f9a8d4',
              400: '#f472b6',
              500: '#ec4899',
              600: '#db2777',
              700: '#be185d',
            }
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },

        }
      }

  <style>
    .glassmorphism {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .dark-glassmorphism {
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .text-gradient {
      background: linear-gradient(135deg, #0c94eb 0%, #db2777 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .bg-gradient-brand {
      background: linear-gradient(135deg, #0c94eb 0%, #035da1 100%);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-x-hidden">

  <section id="admin-panel" class="py-20 bg-slate-900 text-white relative overflow-hidden">
    <div class="container mx-auto px-4 relative z-10">
      <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
          <span class="px-4 py-1.5 bg-brand-500/10 text-brand-400 rounded-full text-sm font-semibold tracking-wide uppercase border border-brand-500/20">Gestión de Catálogo</span>
          <h2 class="font-display text-3xl md:text-4xl font-bold mt-4 mb-2">Panel de Administrador</h2>
          <p class="text-slate-400">Agrega nuevos modelos de armazones o actualiza las colecciones en tiempo real.</p>
        </div>

        <div class="dark-glassmorphism border border-slate-800 rounded-3xl p-6 md:p-10 shadow-2xl">
          <form id="adminFrameForm" onsubmit="handleAdminSubmit(event)" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Nombre del Modelo</label>
                <input type="text" id="adminName" required class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 transition-colors" placeholder="Ej. Urban Flex 2.0">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Colección / Categoría</label>
                <select id="adminCategory" required class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 transition-colors">
                  <option value="ejecutivo">Línea Ejecutiva</option>
                  <option value="industrial">Línea Industrial / Seguridad</option>
                  <option value="flex">Línea Flexible / Kids</option>
                  <option value="sol">Línea Solar Protegida</option>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Material / Características</label>
                <input type="text" id="adminMaterial" required class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 transition-colors" placeholder="Ej. TR90 / Titanio / Acetato">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Precio Estimado (Opcional)</label>
                <input type="text" id="adminPrice" class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500 transition-colors" placeholder="Ej. Incluido en paquete">
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Fotografía del Modelo (JPG, JPEG, PNG)</label>
              <div class="relative group mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-800 border-dashed rounded-xl hover:border-brand-500 transition-colors bg-slate-950/30">
                <div class="space-y-1 text-center">
                  <svg class="mx-auto h-12 w-12 text-slate-400 group-hover:text-brand-400 transition-colors" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4-4m4 24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                  <div class="flex text-sm text-slate-400">
                    <label for="adminImageFile" class="relative cursor-pointer bg-transparent rounded-md font-medium text-brand-400 hover:text-brand-300 focus-within:outline-none">
                      <span>Selecciona un archivo</span>
                      <input id="adminImageFile" name="adminImageFile" type="file" accept=".jpg, .jpeg, .png" class="sr-only" onchange="previewImageFile(event)">
                    </label>
                    <p class="pl-1">o arrastra y suelta</p>
                  </div>
                  <p class="text-xs text-slate-500">Formato JPG o PNG de alta resolución</p>
                </div>
              </div>
              <div id="imagePreviewContainer" class="hidden mt-4 flex items-center space-x-4 p-3 bg-slate-950/50 border border-slate-800 rounded-xl">
                <img id="imagePreview" src="" alt="Vista previa" class="h-20 w-28 object-cover rounded-lg border border-slate-700">
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-medium text-slate-200 truncate" id="previewFileName">Nombre_del_archivo.jpg</p>
                  <p class="text-xs text-slate-500" id="previewFileSize">0 KB</p>
                </div>
                <button type="button" onclick="removeSelectedImage()" class="text-xs font-semibold text-rose-400 hover:text-rose-300 transition-colors px-3 py-1.5 bg-rose-500/10 rounded-lg border border-rose-500/20">Quitar</button>
              </div>
            </div>

            <div class="pt-4 flex justify-end space-x-4">
              <button type="button" onclick="clearAdminForm()" class="px-5 py-3 rounded-xl border border-slate-800 text-slate-300 hover:bg-slate-800 transition-all text-sm font-medium">Limpiar Campos</button>
              <button type="submit" class="px-6 py-3 rounded-xl bg-gradient-brand text-white font-medium hover:opacity-95 transition-all text-sm shadow-lg shadow-brand-500/20 flex items-center space-x-2">
                <span>Guardar Modelo en Catálogo</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Variable global para guardar la imagen en Base64 de forma temporal
    let loadedImageBase64 = "";

    // Función para procesar y previsualizar la foto subida (.jpg o .png)
    function previewImageFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      // Validar tipo de archivo
      if (!file.type.match('image/jpeg') && !file.type.match('image/png') && !file.type.match('image/jpg')) {
        alert('Por favor, selecciona una imagen válida en formato JPG o PNG.');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        loadedImageBase64 = e.target.result;
        
        // Asignar los datos al contenedor de vista previa
        document.getElementById('imagePreview').src = loadedImageBase64;
        document.getElementById('previewFileName').textContent = file.name;
        document.getElementById('previewFileSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
        
        // Mostrar el contenedor
        document.getElementById('imagePreviewContainer').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    // Función para quitar la imagen seleccionada
    function removeSelectedImage() {
      loadedImageBase64 = "";
      document.getElementById('adminImageFile').value = "";
      document.getElementById('imagePreviewContainer').classList.add('hidden');
      document.getElementById('imagePreview').src = "";
    }

    // Función modificada para procesar el submit del administrador
    function handleAdminSubmit(event) {
      event.preventDefault();
      
      const name = document.getElementById('adminName').value.trim();
      const category = document.getElementById('adminCategory').value;
      const material = document.getElementById('adminMaterial').value.trim();
      const price = document.getElementById('adminPrice').value.trim();

      if (!name || !material) {
        alert('Por favor completa los campos obligatorios.');
        return;
      }

      // Objeto estructurado listo con la imagen adjuntada en Base64 o una por defecto
      const nuevoModelo = {
        id: 'modelo-' + Date.now(),
        nombre: name,
        categoria: category,
        material: material,
        precio: price || 'Incluido',
        imagen: loadedImageBase64 || 'https://images.unsplash.com/photo-1574258495973-f010dfbb5371?auto=format&fit=crop&w=600&q=80'
      };

      // Mensaje de éxito simulado o integración con tu lógica local existente
      alert(`¡Modelo "${nuevoModelo.nombre}" agregado con éxito al catálogo local en la categoría ${nuevoModelo.categoria}!`);
      
      // Limpiar formulario tras guardar exitosamente
      clearAdminForm();
    }

    function clearAdminForm() {
      document.getElementById('adminFrameForm').reset();
      removeSelectedImage();
    }
  </script>

</body>
